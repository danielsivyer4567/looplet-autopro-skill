<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5eead4"/>
    </marker>
    <marker id="arrowO" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#fdba74"/>
    </marker>
    <style>
      .bg{fill:#0a0c10}
      .card{fill:#0d1424;stroke:#2a3140;stroke-width:1.5;rx:12}
      .title{fill:#5eead4;font-weight:800}
      .h{fill:#f8fafc;font-weight:700}
      .t{fill:#cbd5e1}
      .m{fill:#64748b;font-size:12px}
      .code{fill:#a3e635;font-family:ui-monospace,Consolas,monospace}
      .accent{fill:#38bdf8}
      .warn{fill:#fb7185}
      .line{stroke:#5eead4;stroke-width:2;fill:none}
      .lineO{stroke:#fdba74;stroke-width:2;fill:none}
      .dash{stroke:#5eead4;stroke-width:1.5;fill:none;stroke-dasharray:5 4}
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="1500"/>

  <!-- HEADER -->
  <text x="600" y="46" text-anchor="middle" class="title" font-size="30">SHOW TIME — Portable Multi-Repo Board Spec</text>
  <text x="600" y="74" text-anchor="middle" class="m" font-size="14">One localhost board. Any repo joins its canvas as a lane. No URLs handed out — a file BEACON is the rendezvous. Find-or-attach: reuse, never spawn a rival.</text>

  <!-- ============ 1. THE BEACON (rendezvous) ============ -->
  <rect class="card" x="40" y="100" width="520" height="280" rx="12"/>
  <text x="60" y="130" class="title" font-size="18">① THE BEACON  (how joiners find the board — NOT a URL)</text>
  <text x="60" y="158" class="t" font-size="13">The host writes 3 files to a well-known dir on boot.</text>
  <text x="60" y="176" class="t" font-size="13">Anything on the machine reads them to discover the board.</text>
  <text x="60" y="204" class="code" font-size="13">&lt;home&gt;/.claude/scratch/autopro-theater/</text>
  <text x="80" y="228" class="code" font-size="13">server.port   → "8770"        (which port)</text>
  <text x="80" y="248" class="code" font-size="13">server.token  → "&lt;48-hex&gt;"     (per-boot auth)</text>
  <text x="80" y="268" class="code" font-size="13">server.pid    → "&lt;pid&gt;"        (liveness)</text>
  <text x="60" y="298" class="m" font-size="12">Rule: a URL is fragile (port changes, must be copied, the</text>
  <text x="60" y="314" class="m" font-size="12">extension has no address bar). The BEACON is the truth.</text>
  <text x="60" y="338" class="warn" font-size="12">Do NOT sniff for a "blank-URL Chrome window" — unreliable.</text>
  <text x="60" y="354" class="warn" font-size="12">The files are deterministic; use them.</text>

  <!-- ============ 2. FIND-OR-ATTACH ============ -->
  <rect class="card" x="600" y="100" width="560" height="280" rx="12"/>
  <text x="620" y="130" class="title" font-size="18">② FIND-OR-ATTACH  (reuse, never spawn a rival)</text>
  <text x="620" y="158" class="t" font-size="13">BEFORE starting a server or opening the board, probe:</text>
  <text x="640" y="184" class="code" font-size="13">port = read(server.port) || 8770</text>
  <text x="640" y="204" class="code" font-size="13">GET http://127.0.0.1:{port}/api/health</text>
  <text x="620" y="232" class="accent" font-size="14" font-weight="700">alive &amp; ok?</text>
  <text x="640" y="254" class="t" font-size="13">→ ATTACH: register as the next lane. Do NOT start a 2nd server.</text>
  <text x="620" y="278" class="warn" font-size="14" font-weight="700">dead / no answer?</text>
  <text x="640" y="300" class="t" font-size="13">→ SPAWN one server, write the beacon, then register.</text>
  <text x="620" y="330" class="warn" font-size="12">BUG THIS FIXES: on EADDRINUSE the naive server port-scans to</text>
  <text x="620" y="346" class="warn" font-size="12">8771 and starts a RIVAL board + a 2nd runner races the ledger.</text>
  <text x="620" y="362" class="m" font-size="12">Singleton: our board on :8770 makes new arms ATTACH, not clone.</text>

  <!-- ============ 3. MULTI-REPO JOIN (the canvas) ============ -->
  <rect class="card" x="40" y="410" width="1120" height="360" rx="12"/>
  <text x="60" y="440" class="title" font-size="18">③ MULTI-REPO JOIN — one canvas, N repos as lanes</text>

  <!-- host box -->
  <rect x="480" y="470" width="240" height="90" rx="10" fill="#241a16" stroke="#e07a5f" stroke-width="2"/>
  <text x="600" y="498" text-anchor="middle" class="h" font-size="15">HOST REPO (e.g. Looplet AI)</text>
  <text x="600" y="518" text-anchor="middle" class="t" font-size="12">runs theater-server on :8770</text>
  <text x="600" y="536" text-anchor="middle" class="t" font-size="12">writes the beacon · serves ORCH canvas</text>
  <text x="600" y="552" text-anchor="middle" class="m" font-size="11">the ORCHESTRATOR node</text>

  <!-- three joining repos -->
  <g>
    <rect x="90"  y="640" width="300" height="110" rx="10" fill="#0d1424" stroke="#f472b6" stroke-width="1.5"/>
    <text x="240" y="666" text-anchor="middle" class="h" font-size="14">Repo A → lane SA-1 / Chat 1</text>
    <text x="240" y="686" text-anchor="middle" class="t" font-size="11">POST /api/sessions {repoId, branch, ledger...}</text>
    <text x="240" y="704" text-anchor="middle" class="t" font-size="11">heartbeats its slice progress</text>
    <text x="240" y="726" text-anchor="middle" class="m" font-size="11">its ledger slices = the SC-xx rows</text>

    <rect x="450" y="640" width="300" height="110" rx="10" fill="#0d1424" stroke="#5eead4" stroke-width="1.5"/>
    <text x="600" y="666" text-anchor="middle" class="h" font-size="14">Repo B → lane SA-2 / Chat 2</text>
    <text x="600" y="686" text-anchor="middle" class="t" font-size="11">same contract, different repoPath</text>
    <text x="600" y="704" text-anchor="middle" class="t" font-size="11">appears as its own lane automatically</text>
    <text x="600" y="726" text-anchor="middle" class="m" font-size="11">lane N = nextLane(), never collides</text>

    <rect x="810" y="640" width="300" height="110" rx="10" fill="#0d1424" stroke="#c084fc" stroke-width="1.5"/>
    <text x="960" y="666" text-anchor="middle" class="h" font-size="14">Repo C → lane SA-3 / Chat 3</text>
    <text x="960" y="686" text-anchor="middle" class="t" font-size="11">6 people = 6 lanes, zero URLs shared</text>
    <text x="960" y="704" text-anchor="middle" class="t" font-size="11">each ran find-or-attach → same board</text>
    <text x="960" y="726" text-anchor="middle" class="m" font-size="11">operator talks only to ORCH (host)</text>
  </g>

  <path class="lineO" d="M480,515 C400,560 300,600 240,638" marker-end="url(#arrowO)"/>
  <path class="lineO" d="M600,560 L600,638" marker-end="url(#arrowO)"/>
  <path class="lineO" d="M720,515 C800,560 900,600 960,638" marker-end="url(#arrowO)"/>
  <text x="330" y="600" class="m" font-size="11" transform="rotate(-28 330 600)">register + heartbeat</text>

  <!-- ============ 4. THE WORKER ORBIT VISUAL ============ -->
  <rect class="card" x="40" y="800" width="560" height="420" rx="12"/>
  <text x="60" y="830" class="title" font-size="18">④ WORKER ORBIT  (the live "it's working" signal)</text>
  <text x="60" y="856" class="t" font-size="13">Each lane shows its ledger slices as small rows (SC-01, SC-02…).</text>
  <text x="60" y="874" class="t" font-size="13">The crab in an IN-PROGRESS slice row walks the perimeter of</text>
  <text x="60" y="892" class="h" font-size="13">ITS OWN little slice row — NOT the whole card, NOT the orch.</text>

  <!-- example slice rows -->
  <g>
    <!-- working row with orbit path -->
    <rect x="70" y="915" width="500" height="66" rx="8" fill="rgba(0,0,0,.3)" stroke="#5eead4" stroke-width="1.5"/>
    <rect x="60" y="905" width="520" height="86" rx="10" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="6 4"/>
    <text x="220" y="905" class="m" font-size="11">← crab loops THIS row's edge (green), clock-hand style</text>
    <!-- crab on the top edge -->
    <rect x="300" y="908" width="22" height="16" rx="3" fill="#e07a5f"/>
    <rect x="303" y="924" width="4" height="4" fill="#e07a5f"/><rect x="315" y="924" width="4" height="4" fill="#e07a5f"/>
    <text x="90" y="945" class="accent" font-size="13" font-weight="700">SC-17  12%</text>
    <text x="90" y="965" class="t" font-size="12">Harden and prove inline incidents</text>
    <text x="90" y="980" class="code" font-size="11">working — legs marching</text>
  </g>
  <g>
    <rect x="70" y="1005" width="500" height="52" rx="8" fill="rgba(0,0,0,.3)" stroke="#2a3140" stroke-width="1"/>
    <rect x="82" y="1018" width="20" height="15" rx="3" fill="#7a5147"/>
    <text x="120" y="1030" class="m" font-size="13">SC-18   pending — legs STILL (next in line)</text>
  </g>
  <g>
    <rect x="70" y="1070" width="500" height="52" rx="8" fill="rgba(0,0,0,.3)" stroke="#2a3140" stroke-width="1"/>
    <rect x="82" y="1083" width="20" height="15" rx="3" fill="#7a5147"/>
    <text x="120" y="1095" class="warn" font-size="13">SC-19   stalled — legs STILL + RED = bad (ORCH must notice)</text>
  </g>

  <text x="60" y="1150" class="h" font-size="13">CSS mechanism:</text>
  <text x="60" y="1170" class="code" font-size="11.5">.claw-node{ position:relative }   /* the slice row = orbit box */</text>
  <text x="60" y="1188" class="code" font-size="11.5">.claw-node.in-progress .crab{ position:absolute;</text>
  <text x="60" y="1206" class="code" font-size="11.5">  animation:orbit 3s linear infinite }  /* TL→TR→BR→BL→TL */</text>

  <!-- ============ 5. STATES + ATTENTION ============ -->
  <rect class="card" x="620" y="800" width="540" height="420" rx="12"/>
  <text x="640" y="830" class="title" font-size="18">⑤ STATES &amp; ORCH ATTENTION</text>
  <text x="640" y="858" class="t" font-size="13"><tspan class="accent" font-weight="700">working</tspan>  — crab orbits its row, legs march</text>
  <text x="640" y="880" class="t" font-size="13"><tspan class="h" font-weight="700">pending</tspan>  — next in line; legs still, no orbit</text>
  <text x="640" y="902" class="t" font-size="13"><tspan fill="#fbbf24" font-weight="700">standby</tspan>  — MUST show a reason (e.g. "conflicting paths")</text>
  <text x="640" y="924" class="t" font-size="13"><tspan class="warn" font-weight="700">stalled/stagnant</tspan> — legs still + RED highlight = "no good"</text>
  <text x="640" y="946" class="t" font-size="13"><tspan fill="#a3e635" font-weight="700">done</tspan>  — ✓, quiet</text>

  <text x="640" y="982" class="h" font-size="14">Escalation (how ORCH gets the operator's attention):</text>
  <text x="640" y="1004" class="t" font-size="12.5">When a lane is stalled/blocked &amp; can't be nudged, the ORCH</text>
  <text x="640" y="1022" class="t" font-size="12.5">node shows a pulsing RED "CLICK HERE" that jumps to that lane.</text>
  <rect x="640" y="1038" width="150" height="34" rx="8" fill="rgba(249,115,22,.15)" stroke="#fb7185" stroke-width="2"/>
  <text x="715" y="1060" text-anchor="middle" class="warn" font-size="14" font-weight="800">⚠ CLICK HERE</text>
  <text x="800" y="1060" class="m" font-size="12">← SA-1 stuck, can't be nudged</text>

  <text x="640" y="1104" class="h" font-size="14">ORCH previous-notes log:</text>
  <text x="640" y="1126" class="t" font-size="12.5">ORCH card shows a "Notes" folder (count) → click opens a</text>
  <text x="640" y="1144" class="t" font-size="12.5">modal with the running log of updates. Data = session.notes[].</text>

  <text x="640" y="1180" class="h" font-size="14">Notifications:</text>
  <text x="640" y="1200" class="t" font-size="12.5">On slice-done OR lane-complete → Web Notification + optional</text>
  <text x="640" y="1218" class="t" font-size="12.5">sound. Toggle: off / per-task / per-line. Diff prev→new done.</text>

  <!-- ============ 6. THE JOIN CONTRACT (API) ============ -->
  <rect class="card" x="40" y="1250" width="1120" height="220" rx="12"/>
  <text x="60" y="1280" class="title" font-size="18">⑥ THE JOIN CONTRACT  (exact API — implement these and any repo can join)</text>
  <text x="60" y="1306" class="code" font-size="12.5">GET  /api/health                 → {ok, port, sessions}  · PUBLIC (no token) · returns token to SAME-ORIGIN only (find-or-attach probe)</text>
  <text x="60" y="1326" class="code" font-size="12.5">POST /api/sessions  {sessionId, repoId, repoPath, branch, ledgerPath, ledgerHash, ledgerTitle, status}  → registers/joins as next lane</text>
  <text x="60" y="1346" class="code" font-size="12.5">GET  /api/sessions               → [{lane, subAgentId:"SA-N", repoId, branch, status, slice, counts, notes}]  · the whole canvas</text>
  <text x="60" y="1366" class="code" font-size="12.5">POST /api/sessions/:id           → heartbeat / status / slice progress / unregister</text>
  <text x="60" y="1386" class="code" font-size="12.5">GET  /api/events                 → SSE stream (live push to the board page)</text>
  <text x="60" y="1406" class="code" font-size="12.5">GET  /api/mission                → fleet rollup {total, done, pct, remaining}</text>
  <text x="60" y="1430" class="warn" font-size="12.5">AUTH: every /api/* except /api/health needs X-Showtime-Token (header or ?t=). No CORS header is ever sent → cross-origin pages can't read it.</text>
  <text x="60" y="1450" class="m" font-size="12">The board page gets the token injected at serve time; it self-heals a stale token by re-fetching /api/health (same-origin) on a 401.</text>
</svg>
